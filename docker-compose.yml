services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: office
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: office_booking
    volumes:
      - office_booking_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U office -d office_booking']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://office:${POSTGRES_PASSWORD}@postgres:5432/office_booking?schema=public
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PIN: ${ADMIN_PIN}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME}
      EVOLUTION_GROUP_JID: ${EVOLUTION_GROUP_JID}
      TZ: Europe/Madrid

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  office_booking_db:
